# MySQL
spring.datasource.url=jdbc:mysql://${MYSQL_HOST:db}:3306/${MYSQL_DATABASE:eurovision}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.driverClassName=com.mysql.cj.jdbc.Driver
spring.datasource.username=${MYSQL_USER:eurovision}
spring.datasource.password=${MYSQL_PASSWORD:secret}
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

spring.jpa.show-sql=true
spring.jpa.open-in-view=false

springdoc.swagger-ui.path=/swagger-ui/index.html
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.server-url=${SERVER_URL:http://localhost:8080}

server.forward-headers-strategy=framework

jwt.secret=${JWT_SECRET:eurovision2026-super-secret-key-must-be-at-least-32-chars}
